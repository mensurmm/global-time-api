<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time & Ethiopian Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full p-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-bold mb-2 text-blue-400">What Time Is It?</h1>
        <p class="text-slate-400 mb-8">Global Time & Ethiopian Calendar Converter</p>
        
        <div class="space-y-6">
            <div class="p-6 bg-slate-700 rounded-xl text-center">
                <div id="clock" class="text-5xl font-mono font-bold text-white">00:00:00</div>
                <div id="date-string" class="mt-2 text-blue-300 font-medium">Loading Date...</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <select id="lang" class="bg-slate-700 p-2 rounded border border-slate-600 outline-none">
                    <option value="en">English</option>
                    <option value="am">አማርኛ</option>
                </select>
                <select id="calendar" class="bg-slate-700 p-2 rounded border border-slate-600 outline-none">
                    <option value="gregorian">Gregorian</option>
                    <option value="ethiopian">Ethiopian</option>
                </select>
            </div>
        </div>
    </div>

    <script>
        async function updateTime() {
            const lang = document.getElementById('lang').value;
            const cal = document.getElementById('calendar').value;
            
            // Calling your FastAPI endpoint!
            const res = await fetch(`/today?lang=${lang}&calendar=${cal}`);
            const data = await res.json();
            
            document.getElementById('date-string').innerText = `${data.day}, ${data.date}`;
            
            // Local clock for visual effect
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }

        // Update every second
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
